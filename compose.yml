x-variables: &variables
  UID: ${UID:-1000}
  GID: ${GID:-1000}
  ENV: ${ENV:-production}

x-config: &config
  restart: unless-stopped
  working_dir: /var/www/html
  healthcheck:
    timeout: 6s
    interval: 2s
    retries: 199
    start_period: 3s
    test: ["CMD", "test", "-f", "/tmp/ready.signal"]

secrets:
  mysql_root_password:
    file: ./secrets/mysql_root_password.txt
  mysql_password:
    file: ./secrets/mysql_password.txt
  mariadb_root_password:
    file: ./secrets/mariadb_root_password.txt
  mariadb_password:
    file: ./secrets/mariadb_password.txt

volumes:
  phpmyadmin:

services:
  nginx:
    image: ${APP_NAME:-laravel}:nginx
    container_name: ${APP_NAME:-laravel}-nginx
    <<: *config
    build:
      context: .
      dockerfile: ./nginx/Dockerfile
      args:
        <<: *variables
        NGINX_VERSION: ${NGINX_VERSION}
        NGINX_SERVER_NAME: ${NGINX_SERVER_NAME}
    environment:
      <<: *variables
    volumes:
      - ${SOURCE_DIR:-../.}:/var/www/html:delegated
      - phpmyadmin:/var/www/phpmyadmin
    ports:
      - ${NGINX_MAP_PORT_80:-80}:80
      - ${NGINX_MAP_PORT_433:-433}:433
    depends_on:
      artisan:
        condition: service_healthy
      node:
        condition: service_healthy
      phpmyadmin:
        condition: service_healthy

  php:
    image: ${APP_NAME:-laravel}:php
    container_name: ${APP_NAME:-laravel}-php
    <<: *config
    build:
      context: .
      dockerfile: ./php/Dockerfile
      args:
        <<: *variables
        PHP_VERSION: ${PHP_VERSION}
        PHP_EXTENSIONS: ${PHP_EXTENSIONS}
    volumes:
      - ${SOURCE_DIR:-../.}:/var/www/html:delegated
    depends_on:
      mysql:
        condition: service_healthy
      mariadb:
        condition: service_healthy

  composer:
    image: "${APP_NAME:-laravel}:composer"
    container_name: "${APP_NAME:-laravel}-composer"
    <<: *config
    build:
      context: .
      dockerfile: ./composer/Dockerfile
      args:
        IMAGE: ${APP_NAME:-laravel}:php
    environment:
      <<: *variables
    volumes:
      - ${SOURCE_DIR:-../.}:/var/www/html:delegated
    depends_on:
      php:
        condition: service_healthy

  artisan:
    image: "${APP_NAME:-laravel}:artisan"
    container_name: "${APP_NAME:-laravel}-artisan"
    <<: *config
    build:
      context: .
      dockerfile: ./artisan/Dockerfile
      args:
        IMAGE: ${APP_NAME:-laravel}:php
    environment:
      <<: *variables
    volumes:
      - ${SOURCE_DIR:-../.}:/var/www/html:delegated
    depends_on:
      composer:
        condition: service_healthy

  mysql:
    image: ${APP_NAME:-laravel}:mysql
    container_name: ${APP_NAME:-laravel}-mysql
    <<: *config
    build:
      context: .
      dockerfile: ./mysql/Dockerfile
      args:
        <<: *variables
        MYSQL_VERSION: ${MYSQL_VERSION}
    volumes:
      - ${MYSQL_DATA_DIR:-./mysql/data}:/var/lib/mysql
      - ${MYSQL_INITDB_DIR:-./mysql/initdb.d}:/docker-entrypoint-initdb.d
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: ${MYSQL_ALLOW_EMPTY_PASSWORD}
      MYSQL_RANDOM_ROOT_PASSWORD: ${MYSQL_RANDOM_ROOT_PASSWORD}
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/mysql_root_password
      MYSQL_USER: ${MYSQL_USER:-laravel}
      MYSQL_PASSWORD_FILE: /run/secrets/mysql_password
      MYSQL_DATABASE: ${MYSQL_DATABASE:-laravel}
    secrets:
      - mysql_root_password
      - mysql_password

  node:
    image: "${APP_NAME:-laravel}:node"
    container_name: "${APP_NAME:-laravel}-node"
    <<: *config
    build:
      context: .
      dockerfile: ./node/Dockerfile
      args:
        <<: *variables
        NODE_VERSION: ${NODE_VERSION}
    environment:
      <<: *variables
    ports:
      - 5173:5173
    volumes:
      - ${SOURCE_DIR:-../.}:/var/www/html:delegated

  cron:
    image: "${APP_NAME:-laravel}:cron"
    container_name: "${APP_NAME:-laravel}-cron"
    <<: *config
    build:
      context: .
      dockerfile: ./cron/Dockerfile
      args:
        IMAGE: ${APP_NAME:-laravel}:php
    volumes:
      - ${SOURCE_DIR:-../.}:/var/www/html:delegated
    depends_on:
      artisan:
        condition: service_healthy

  supervisor:
    image: "${APP_NAME:-laravel}:supervisor"
    container_name: "${APP_NAME:-laravel}-supervisor"
    <<: *config
    build:
      context: .
      dockerfile: ./supervisor/Dockerfile
      args:
        IMAGE: ${APP_NAME:-laravel}:php
    volumes:
      - ${SOURCE_DIR:-../.}:/var/www/html:delegated
    depends_on:
      artisan:
        condition: service_healthy

  mariadb:
    image: ${APP_NAME:-laravel}:mariadb
    container_name: ${APP_NAME:-laravel}-mariadb
    <<: *config
    build:
      context: .
      dockerfile: ./mariadb/Dockerfile
      args:
        <<: *variables
        MARIADB_VERSION: ${MARIADB_VERSION}
    volumes:
      - ${MARIADB_DATA_DIR:-./mariadb/data}:/var/lib/mysql
      - ${MARIADB_INITDB_DIR:-./mariadb/initdb.d}:/docker-entrypoint-initdb.d
    environment:
      MARIADB_ALLOW_EMPTY_ROOT_PASSWORD: ${MARIADB_ALLOW_EMPTY_ROOT_PASSWORD}
      MARIADB_RANDOM_ROOT_PASSWORD: ${MARIADB_RANDOM_ROOT_PASSWORD}
      MARIADB_ROOT_PASSWORD_FILE: /run/secrets/mariadb_root_password
      MARIADB_USER: ${MARIADB_USER:-laravel}
      MARIADB_PASSWORD_FILE: /run/secrets/mariadb_password
      MARIADB_DATABASE: ${MARIADB_DATABASE:-laravel}
    secrets:
      - mariadb_root_password
      - mariadb_password

  phpmyadmin:
    image: "${APP_NAME:-laravel}:phpmyadmin"
    container_name: "${APP_NAME:-laravel}-phpmyadmin"
    <<: *config
    build:
      context: .
      dockerfile: ./phpmyadmin/Dockerfile
      args:
        IMAGE: ${APP_NAME:-laravel}:php
    volumes:
      - phpmyadmin:/var/www/phpmyadmin
    depends_on:
      php:
        condition: service_healthy