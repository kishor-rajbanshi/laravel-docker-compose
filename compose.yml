x-uid_gid: &uid_gid
  USER_ID: ${USER_ID:-1000}
  GROUP_ID: ${GROUP_ID:-1000}

volumes:
  phpmyadmin:
    name: ${APP_NAME:-laravel}_phpmyadmin

  shared_data:
    name: ${APP_NAME:-laravel}_shared_data

services:
  nginx:
    pull_policy: never
    image: ${APP_NAME:-laravel}:nginx
    container_name: ${APP_NAME:-laravel}-nginx
    restart: unless-stopped
    working_dir: /var/www/html
    build:
      context: ./docker
      dockerfile: ./nginx/Dockerfile
      args:
        <<: *uid_gid
        NGINX_VERSION: ${NGINX_VERSION:-stable}
    environment:
      APP_ENV: ${APP_ENV:-local}
      NGINX_HOST: ${NGINX_HOST:-_}
    volumes:
      - ./:/var/www/html:delegated
    #   - phpmyadmin:/var/www/phpmyadmin
    ports:
      - ${NGINX_PORT:-80}:80
      # - ${NGINX_SSL_PORT:-433}:433
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost"]
      start_period: 5s
      interval: 30s
      timeout: 2s
      retries: 3
    # depends_on:
    #   composer:
    #     condition: service_healthy
    #   node:
    #     condition: service_healthy
