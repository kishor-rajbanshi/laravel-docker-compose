x-uid_gid: &uid_gid
  USER_ID: ${USER_ID:-1000}
  GROUP_ID: ${GROUP_ID:-1000}

volumes:
  phpmyadmin:
    name: ${APP_NAME:-laravel}_phpmyadmin

services:
  nginx:
    pull_policy: never
    image: ${APP_NAME:-laravel}:nginx
    container_name: ${APP_NAME:-laravel}-nginx
    restart: unless-stopped
    working_dir: /var/www/html
    build:
      context: ./docker
      dockerfile: ./nginx/Dockerfile
      args:
        <<: *uid_gid
        NGINX_VERSION: ${NGINX_VERSION:-stable}
    environment:
      APP_ENV: ${APP_ENV:-local}
      NGINX_HOST: ${NGINX_HOST:-_}
    volumes:
      - ./:/var/www/html:delegated
    #   - phpmyadmin:/var/www/phpmyadmin
    ports:
      - ${NGINX_PORT:-80}:80
      # - ${NGINX_SSL_PORT:-433}:433
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost"]
      start_period: 3s
      interval: 30s
      timeout: 2s
      retries: 3
    depends_on:
      php:
        condition: service_healthy
        #restart: true

  php:
    pull_policy: never
    image: ${APP_NAME:-laravel}:php
    container_name: ${APP_NAME:-laravel}-php
    restart: unless-stopped
    working_dir: /var/www/html
    build:
      context: ./docker
      dockerfile: ./php/Dockerfile
      args:
        <<: *uid_gid
        PHP_VERSION: ${PHP_VERSION}
        PHP_EXTENSIONS: ${PHP_EXTENSIONS}
    environment:
      APP_ENV: ${APP_ENV:-local}
    volumes:
      - ./:/var/www/html:delegated
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t 2>&1 | grep -q 'test is successful'"]
      start_period: 3s
      interval: 30s
      timeout: 2s
      retries: 3